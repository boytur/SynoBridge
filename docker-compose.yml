services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    env_file: .env
    environment:
      - GIN_MODE=debug
      - DB_PATH=/data/omnismb.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme32byteskey1234567890123}
      - FRONTEND_URL=http://localhost:5173
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
    volumes:
      - db_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
        - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    networks:
      - omnismb

volumes:
  db_data:

networks:
  omnismb:
    driver: bridge
